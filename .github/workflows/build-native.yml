name: Build Native Apps

on:
  push:
    branches: [main]
  release:
    types: [created]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Create Windows App
        run: |
          jpackage --input target --main-jar target/svnsearch-1.0.0.jar `
            --name "SVN Search" `
            --app-version 1.0.0 `
            --vendor "SVNSearch" `
            --description "类似 Everything 的 SVN 文件快速搜索工具" `
            --type exe `
            --dest dist/

      - name: Upload Windows
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/*.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Create macOS App
        run: |
          jpackage --input target --main-jar target/svnsearch-1.0.0.jar \
            --name "SVN Search" \
            --app-version 1.0.0 \
            --vendor "SVNSearch" \
            --description "类似 Everything 的 SVN 文件快速搜索工具" \
            --type app \
            --dest dist/

      - name: Upload macOS
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: dist/*.app

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Create Linux App
        run: |
          jpackage --input target --main-jar target/svnsearch-1.0.0.jar \
            --name "svnsearch" \
            --app-version 1.0.0 \
            --vendor "SVNSearch" \
            --description "类似 Everything 的 SVN 文件快速搜索工具" \
            --type deb \
            --dest dist/

      - name: Upload Linux
        uses: actions/upload-artifact@v4
        with:
          name: linux-app
          path: dist/*.deb

  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            **/*.exe
            **/*.app
            **/*.deb
          draft: false
