name: Build macOS App

on:
  workflow_dispatch: {}

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Cache Rust toolchain
        uses: actions/cache@v4
        with:
          path: |
            ~/.rustup
          key: ${{ runner.os }}-rust-toolchain-stable
          restore-keys: |
            ${{ runner.os }}-rust-toolchain-

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Cache Rust (cargo + target)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build macOS bundle (Intel x86_64)
        run: |
          set -e
          # 使用项目内依赖（npm ci 已安装 @tauri-apps/cli），避免 npx/全局安装带来的重复下载
          npm run tauri:build -- --target x86_64-apple-darwin

      - name: Upload macOS bundles
        uses: actions/upload-artifact@v4
        with:
          name: macos-bundles
          path: |
            src-tauri/target/release/bundle/macos/**
            src-tauri/target/x86_64-apple-darwin/release/bundle/macos/**
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/**
            src-tauri/target/*-apple-darwin/release/bundle/macos/**
          if-no-files-found: ignore
