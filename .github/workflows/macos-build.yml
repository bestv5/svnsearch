name: Build macOS App

on:
  workflow_dispatch: {}

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli

      - name: Add x86_64 target (Intel mac)
        env:
          CARGO_HOME: ${{ runner.temp }}/cargo
        run: |
          set -e
          source $HOME/.cargo/env || true
          rustup target add x86_64-apple-darwin || true

      - name: Build macOS bundle (Intel x86_64)
        env:
          CARGO_HOME: ${{ runner.temp }}/cargo
        run: |
          set -e
          source $HOME/.cargo/env || true
          # Build Intel (x86_64) macOS bundle
          npx --yes tauri build --target x86_64-apple-darwin

      - name: Upload macOS bundles
        uses: actions/upload-artifact@v4
        with:
          name: macos-bundles
          path: src-tauri/target/release/bundle/macos/*
