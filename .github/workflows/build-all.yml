name: Build All Platforms

on:
  push:
    branches: [main]
  release:
    types: [created]

jobs:
  build-python-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller flask flask-cors apscheduler

      - name: Build Python Windows exe
        run: |
          pyinstaller --onedir --name SvnSearch --windowed --add-data "static;static" app.py
        shell: cmd

      - name: Create zip
        run: |
          powershell -Command "Compress-Archive -Path 'dist\SvnSearch\*' -DestinationPath 'dist\SvnSearch-Windows.zip'"

      - name: Upload Python Windows
        uses: actions/upload-artifact@v4
        with:
          name: python-windows
          path: dist/*.zip

  build-java-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean package -DskipTests
        shell: cmd

      - name: Create Windows App
        run: |
          jpackage --input target --main-jar svnsearch-1.0.0.jar --name "SVN-Search-Java" --app-version 1.0.0 --type exe --dest dist/
        shell: cmd

      - name: Upload Java Windows
        uses: actions/upload-artifact@v4
        with:
          name: java-windows
          path: dist/*.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Create macOS App
        run: |
          jpackage --input target --main-jar svnsearch-1.0.0.jar --name "SVN-Search" --app-version 1.0.0 --type app --dest dist/

      - name: Upload macOS
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: dist/*.app

  release:
    needs: [build-python-windows, build-java-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List files
        run: find artifacts -type f

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/**/*.zip
            artifacts/**/*.exe
            artifacts/**/*.app
          draft: false
