name: Build Windows App

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      CARGO_INCREMENTAL: 0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache Rust toolchain
        uses: actions/cache@v4
        with:
          path: |
            ~/.rustup
          key: ${{ runner.os }}-rust-toolchain-stable
          restore-keys: |
            ${{ runner.os }}-rust-toolchain-

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Get Rust toolchain version
        id: rust-version
        run: |
          $raw = (& rustc --version 2>$null).Trim()
          if ($raw -match 'rustc\s+(\d+\.\d+\.\d+)') {
            $ver = $matches[1]
          } else {
            $ver = "stable-fallback"
          }
          Write-Host "Detected rust version: $ver"
          "toolchain=$ver" | Out-File -Encoding utf8 -NoNewline $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ steps.rust-version.outputs.toolchain }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ steps.rust-version.outputs.toolchain }}-
            ${{ runner.os }}-cargo-

      - name: Build app with Tauri
        run: |
          # 只构建 NSIS（输出在 bundle/nsis，供便携 zip 使用），不构建 MSI 以加快单次构建
          npx @tauri-apps/cli build --verbose --bundles nsis
        shell: pwsh

      - name: Verify build artifacts
        run: |
          Write-Host "Checking for Windows build artifacts..."
          $bundlePath = "src-tauri/target/release/bundle/nsis"
          $msiPath = "src-tauri/target/release/bundle/msi"
          $releasePath = "src-tauri/target/release"

          if ((Test-Path $bundlePath) -or (Test-Path $msiPath) -or (Test-Path $releasePath)) {
            Write-Host "✓ Bundle directory found."
            Write-Host ""
            Write-Host "Contents:"
            if (Test-Path $bundlePath) {
              Get-ChildItem -Path $bundlePath -Recurse | Format-Table FullName, Length -AutoSize
            }
            if (Test-Path $msiPath) {
              Get-ChildItem -Path $msiPath -Recurse | Format-Table FullName, Length -AutoSize
            }
            if (Test-Path $releasePath) {
              Write-Host ""
              Write-Host "Release executables:"
              Get-ChildItem -Path $releasePath -Filter "*.exe" | Format-Table FullName, Length -AutoSize
            }
          } else {
            Write-Host "✗ Bundle directory not found!"
            Write-Host ""
            Write-Host "Release directory contents:"
            if (Test-Path "src-tauri/target/release") {
              Get-ChildItem -Path "src-tauri/target/release" -Force | Format-Table Name, Length
            }
            exit 1
          }
        shell: pwsh

      - name: Create portable zip
        run: |
          $ErrorActionPreference = "Stop"

          # Tauri 2 的 Windows 输出在 bundle/nsis（不是 bundle/windows）
          $productName = "SVNSearch"
          $bundleNsisDir = "src-tauri/target/release/bundle/nsis"
          $releaseDir = "src-tauri/target/release"
          $outDir = "dist"
          $zipPath = Join-Path $outDir "svnsearch-windows-portable.zip"

          New-Item -ItemType Directory -Force -Path $outDir | Out-Null
          if (Test-Path $zipPath) { Remove-Item $zipPath -Force }

          # 优先从 bundle/nsis 找已打包的 exe 所在目录（同目录下仅有运行所需文件）
          $filesToZip = $null
          if (Test-Path $bundleNsisDir) {
            $exe = Get-ChildItem $bundleNsisDir -Recurse -Filter "$productName.exe" | Select-Object -First 1
            if ($exe) {
              $portableRoot = $exe.Directory.FullName
              Write-Host "Using bundle/nsis app dir: $portableRoot"
              $filesToZip = (Get-ChildItem -Path $portableRoot -File).FullName
            }
          }

          # Fallback：从 release 只取 exe + dll。优先用 productName 的 SVNSearch.exe（Tauri 打包时生成），否则用 Cargo 的 svnsearch-desktop.exe，只打一个主程序 exe
          if (-not $filesToZip -or $filesToZip.Count -eq 0) {
            if (-not (Test-Path $releaseDir)) { Write-Error "Release directory not found: $releaseDir" }
            $mainExe = Get-ChildItem $releaseDir -Filter "$productName.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
            if (-not $mainExe) {
              $mainExe = Get-ChildItem $releaseDir -Filter "*.exe" | Where-Object { $_.Name -notmatch "setup|\.test\.|\.bench\." } | Select-Object -First 1
            }
            if (-not $mainExe) { Write-Error "No app executable found in $releaseDir" }
            Write-Host "Fallback: packaging only $($mainExe.Name) + dll from release (no deps/build)"
            $filesToZip = @($mainExe.FullName) + (Get-ChildItem $releaseDir -Filter "*.dll").FullName
          }

          if (-not $filesToZip -or $filesToZip.Count -eq 0) { Write-Error "No files to include in portable zip" }

          Compress-Archive -Path $filesToZip -DestinationPath $zipPath -Force
          Write-Host "Created portable archive at $zipPath ($(($filesToZip | Measure-Object).Count) files)"
        shell: pwsh

      - name: Upload Windows portable bundle
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: |
            dist/svnsearch-windows-portable.zip
          if-no-files-found: ignore
