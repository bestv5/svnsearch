name: Build Windows App

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      RUSTUP_HOME: ${{ runner.temp }}\rustup
      CARGO_HOME: ${{ runner.temp }}\cargo
      CARGO_INCREMENTAL: 0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Get Rust toolchain version
        id: rust-version
        run: |
          $raw = (& rustc --version 2>$null).Trim()
          if ($raw -match 'rustc\s+(\d+\.\d+\.\d+)') {
            $ver = $matches[1]
          } else {
            $ver = "stable-fallback"
          }
          Write-Host "Detected rust version: $ver"
          "toolchain=$ver" | Out-File -Encoding utf8 -NoNewline $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Cache Rust toolchain
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.RUSTUP_HOME }}
            ${{ env.CARGO_HOME }}
          key: ${{ runner.os }}-rust-toolchain-${{ steps.rust-version.outputs.toolchain }}
          restore-keys: |
            ${{ runner.os }}-rust-toolchain-

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build app with Tauri
        run: |
          npm install -g @tauri-apps/cli
          npm run tauri:build -- --verbose
        shell: pwsh

      - name: Verify build artifacts
        run: |
          Write-Host "Checking for Windows build artifacts..."
          $bundlePath = "src-tauri/target/release/bundle/windows"
          $msiPath = "src-tauri/target/release/bundle/msi"

          if (Test-Path $bundlePath -or Test-Path $msiPath) {
            Write-Host "✓ Bundle directory found."
            Write-Host ""
            Write-Host "Contents:"
            if (Test-Path $bundlePath) {
              Get-ChildItem -Path $bundlePath -Recurse | Format-Table FullName, Length -AutoSize
            }
            if (Test-Path $msiPath) {
              Get-ChildItem -Path $msiPath -Recurse | Format-Table FullName, Length -AutoSize
            }
          } else {
            Write-Host "✗ Bundle directory not found!"
            Write-Host ""
            Write-Host "Release directory contents:"
            if (Test-Path "src-tauri/target/release") {
              Get-ChildItem -Path "src-tauri/target/release" -Force | Format-Table Name, Length
            }
            exit 1
          }
        shell: pwsh

      - name: Upload Windows bundles
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: windows-bundles
          path: src-tauri/target/release/bundle/windows/
          if-no-files-found: error
