name: Build Windows App

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      CARGO_INCREMENTAL: 0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust (cargo + target)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Clean stale bundle artifacts
        run: |
          # 由于缓存了 src-tauri/target，可能残留上一次构建出来的 msi/nsis/旧 exe，导致看起来“生成了很多包”
          Remove-Item "src-tauri/target/release/bundle" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "src-tauri/target/release/*.msi" -Force -ErrorAction SilentlyContinue
          Remove-Item "src-tauri/target/release/*-setup.exe" -Force -ErrorAction SilentlyContinue
        shell: pwsh

      - name: Build app with Tauri
        run: |
          # 只编译，严禁生成任何安装包/Bundle（nsis/msi 等）
          # 使用项目内依赖（npm ci 已安装 @tauri-apps/cli），避免 npx 触发的重复下载
          npm run tauri:build -- --verbose --no-bundle
        shell: pwsh

      - name: Verify build artifacts
        run: |
          Write-Host "Checking for Windows build artifacts..."
          $releasePath = "src-tauri/target/release"

          # 由于我们使用了 --no-bundle，出现任何 bundle 目录都视为违规（可能来自缓存残留）
          $bundleRoot = "src-tauri/target/release/bundle"
          if (Test-Path $bundleRoot) {
            Write-Host "✗ Bundle directory must not exist (portable-only build), found: $bundleRoot"
            Get-ChildItem -Path $bundleRoot -Recurse | Format-Table FullName, Length -AutoSize
            exit 1
          }

          if (Test-Path $releasePath) {
            Write-Host "✓ Release directory found."
            Write-Host ""
            Write-Host "Release executables:"
            Get-ChildItem -Path $releasePath -Filter "*.exe" | Format-Table FullName, Length -AutoSize
          } else {
            Write-Host "✗ Release directory not found!"
            Write-Host ""
            Write-Host "Release directory contents:"
            if (Test-Path "src-tauri/target") {
              Get-ChildItem -Path "src-tauri/target" -Force | Format-Table Name, Length
            }
            exit 1
          }
        shell: pwsh

      - name: Create portable bundle (no inner zip)
        run: |
          $ErrorActionPreference = "Stop"

          $productName = "SVNSearch"
          $releaseDir = "src-tauri/target/release"
          $portableDir = "dist/svnsearch-windows-portable"

          # 只允许便携包：从 release 目录取主程序 exe + dll（严禁从 bundle 目录取文件）
          if (-not (Test-Path $releaseDir)) { Write-Error "Release directory not found: $releaseDir" }
          $mainExe = Get-ChildItem $releaseDir -Filter "$productName.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $mainExe) { Write-Error "Main exe not found: $releaseDir\\$productName.exe" }

          Remove-Item -Path $portableDir -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $portableDir | Out-Null

          Write-Host "Copying portable files: $($mainExe.Name) + dll from release"
          Copy-Item -Path $mainExe.FullName -Destination $portableDir -Force
          Get-ChildItem $releaseDir -Filter "*.dll" -ErrorAction SilentlyContinue | ForEach-Object { Copy-Item $_.FullName -Destination $portableDir -Force }
          $fileCount = (Get-ChildItem $portableDir -File).Count
          Write-Host "Created portable folder at $portableDir ($fileCount files). Artifact zip will contain exe+dll directly (one unzip)."
        shell: pwsh

      - name: Upload Windows portable bundle
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: dist/svnsearch-windows-portable
          if-no-files-found: ignore
