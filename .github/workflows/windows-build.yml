name: Build Windows App

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      CARGO_INCREMENTAL: 0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache Rust toolchain
        uses: actions/cache@v4
        with:
          path: |
            ~/.rustup
            ~/.cargo
          key: ${{ runner.os }}-rust-toolchain-stable
          restore-keys: |
            ${{ runner.os }}-rust-toolchain-

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Get Rust toolchain version
        id: rust-version
        run: |
          $raw = (& rustc --version 2>$null).Trim()
          if ($raw -match 'rustc\s+(\d+\.\d+\.\d+)') {
            $ver = $matches[1]
          } else {
            $ver = "stable-fallback"
          }
          Write-Host "Detected rust version: $ver"
          "toolchain=$ver" | Out-File -Encoding utf8 -NoNewline $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build app with Tauri
        run: |
          npx @tauri-apps/cli build --verbose
        shell: pwsh

      - name: Verify build artifacts
        run: |
          Write-Host "Checking for Windows build artifacts..."
          $bundlePath = "src-tauri/target/release/bundle/windows"
          $msiPath = "src-tauri/target/release/bundle/msi"
          $releasePath = "src-tauri/target/release"

          if ((Test-Path $bundlePath) -or (Test-Path $msiPath) -or (Test-Path $releasePath)) {
            Write-Host "✓ Bundle directory found."
            Write-Host ""
            Write-Host "Contents:"
            if (Test-Path $bundlePath) {
              Get-ChildItem -Path $bundlePath -Recurse | Format-Table FullName, Length -AutoSize
            }
            if (Test-Path $msiPath) {
              Get-ChildItem -Path $msiPath -Recurse | Format-Table FullName, Length -AutoSize
            }
            if (Test-Path $releasePath) {
              Write-Host ""
              Write-Host "Release executables:"
              Get-ChildItem -Path $releasePath -Filter "*.exe" | Format-Table FullName, Length -AutoSize
            }
          } else {
            Write-Host "✗ Bundle directory not found!"
            Write-Host ""
            Write-Host "Release directory contents:"
            if (Test-Path "src-tauri/target/release") {
              Get-ChildItem -Path "src-tauri/target/release" -Force | Format-Table Name, Length
            }
            exit 1
          }
        shell: pwsh

      - name: Create portable zip
        run: |
          $ErrorActionPreference = "Stop"

          # 优先从 bundle/windows 取便携文件夹（包含 exe + 依赖），图标与运行更稳定
          $productName = "SVNSearch"
          $bundleWindowsDir = "src-tauri/target/release/bundle/windows"
          $portableRoot = $null

          if (Test-Path $bundleWindowsDir) {
            $exe = Get-ChildItem $bundleWindowsDir -Recurse -Filter "$productName.exe" | Select-Object -First 1
            if ($exe) {
              $portableRoot = $exe.Directory.FullName
              Write-Host "Found bundled portable app dir: $portableRoot"
            } else {
              Write-Host "No $productName.exe found under $bundleWindowsDir, fallback to release exe."
            }
          } else {
            Write-Host "Bundle windows directory not found: $bundleWindowsDir, fallback to release exe."
          }

          if (-not $portableRoot) {
            $releaseDir = "src-tauri/target/release"
            if (-not (Test-Path $releaseDir)) {
              Write-Error "Release directory not found: $releaseDir"
            }

            $exe = Get-ChildItem $releaseDir -Filter "*.exe" | Select-Object -First 1
            if (-not $exe) {
              Write-Error "No Windows executable (*.exe) found in $releaseDir"
            }

            $portableRoot = $exe.Directory.FullName
            Write-Host "Found release executable: $($exe.FullName)"
          }

          $outDir = "dist"
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null

          $zipPath = Join-Path $outDir "svnsearch-windows-portable.zip"
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }

          Compress-Archive -Path (Join-Path $portableRoot "*") -DestinationPath $zipPath -Force
          Write-Host "Created portable archive at $zipPath"
        shell: pwsh

      - name: Upload Windows portable bundle
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: |
            dist/svnsearch-windows-portable.zip
          if-no-files-found: ignore
